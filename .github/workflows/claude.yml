name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && contains(github.event.issue.body, '@claude'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          model: claude-haiku-4-5-20251001

      - name: Create Draft PR
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 1. Claudeが何か変更したかチェック
          if [ -n "$(git status --porcelain)" ]; then
            # 2. 変更があればコミットしてプッシュ
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            
            # 現在のブランチ名を取得（Claudeが作ったブランチ、または現在のブランチ）
            BRANCH_NAME=$(git branch --show-current)
            
            git add .
            git commit -m "feat: AIによる自動実装"
            git push origin "$BRANCH_NAME"

            # 3. ドラフトPRを作成
            gh pr create \
              --title "【AI】${{ github.event.issue.title || '自動実装の提案' }}" \
              --body "Issue #${{ github.event.issue.number }} に基づき、Claudeがコードを生成しました。" \
              --draft \
              --base main
          else
            echo "変更がなかったため、PRは作成しませんでした。"
          fi

    }}
